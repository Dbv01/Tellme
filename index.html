<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tellme</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
    <!-- Экран авторизации -->
    <div id="authScreen" class="screen active">
        <div class="auth-container">
            <div class="auth-logo">
                <div class="logo-circle">T</div>
                <h1>Tellme</h1>
            </div>
            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">Вход</div>
                <div class="auth-tab" data-tab="register">Регистрация</div>
            </div>
            <div id="loginForm" class="auth-form active">
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button id="loginBtn">Войти</button>
            </div>
            <div id="registerForm" class="auth-form">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="text" id="regNickname" placeholder="Никнейм">
                <input type="text" id="regName" placeholder="Ваше имя">
                <input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)">
                <input type="text" id="regBio" placeholder="О себе">
                <button id="registerBtn">Зарегистрироваться</button>
            </div>
        </div>
    </div>

    <!-- Экран чатов -->
    <div id="chatsScreen" class="screen">
        <div class="header">
            <h2><span class="logo-icon">T</span> Чаты</h2>
            <button id="searchBtn"><i class="fas fa-search"></i></button>
            <button id="profileBtn"><i class="fas fa-user-circle"></i></button>
        </div>
        <div id="chatsList" class="chats-list">
            <div class="empty-state">Чатов пока нет</div>
        </div>
    </div>

    <!-- Экран поиска -->
    <div id="searchScreen" class="screen">
        <div class="header">
            <button class="back-btn" id="backFromSearch"><i class="fas fa-arrow-left"></i></button>
            <h2>Поиск</h2>
        </div>
        <div class="search-container">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Имя, никнейм или email...">
            </div>
        </div>
        <div id="searchResults" class="search-results"></div>
    </div>

    <!-- Экран чата -->
    <div id="chatScreen" class="screen">
        <div class="header">
            <button class="back-btn" id="backToChats"><i class="fas fa-arrow-left"></i></button>
            <div style="flex:1; cursor: pointer;" id="chatProfileBtn">
                <div id="chatTitleName" style="font-weight:bold;"></div>
                <div id="chatStatus" style="font-size:0.7rem;"></div>
            </div>
        </div>
        <div id="messagesContainer" class="messages-container"></div>
        <div class="input-area">
            <button id="attachFileBtn"><i class="fas fa-paperclip"></i></button>
            <input type="text" id="messageInput" placeholder="Сообщение...">
            <button id="sendMsgBtn"><i class="fas fa-arrow-up"></i></button>
        </div>
        <input type="file" id="fileInput" style="display:none" multiple>
    </div>

    <!-- Экран профиля -->
    <div id="profileScreen" class="screen">
        <div class="header">
            <button class="back-btn" id="backFromProfile"><i class="fas fa-arrow-left"></i></button>
            <h2>Профиль</h2>
        </div>
        <div class="profile-header">
            <div class="profile-avatar" id="profileAvatar">
                <i class="fas fa-user-circle"></i>
            </div>
            <div class="profile-name" id="profileName"></div>
            <div class="profile-email" id="profileEmail"></div>
            <div class="profile-bio" id="profileBio"></div>
            <div class="profile-status" id="profileLastSeen"></div>
        </div>
        <div class="settings-item" id="editProfileBtn">
            <span>Редактировать профиль</span>
            <i class="fas fa-chevron-right"></i>
        </div>
        <div class="settings-item" id="logoutBtn">
            <span>Выйти из аккаунта</span>
            <i class="fas fa-sign-out-alt"></i>
        </div>
    </div>

    <!-- Модалка профиля пользователя -->
    <div id="userProfileModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="profile-avatar" id="modalUserAvatar" style="width:80px; height:80px; margin:0 auto;"></div>
            <h3 id="modalUserName" style="margin-top:12px;"></h3>
            <p id="modalUserEmail" style="color:#888; font-size:0.8rem;"></p>
            <p id="modalUserBio" style="color:#aaa; margin:4px 0;"></p>
            <p id="modalUserStatus" style="font-size:0.8rem;"></p>
            <button id="modalStartChatBtn" class="start-chat-btn">Написать сообщение</button>
            <button id="closeModalBtn">Закрыть</button>
        </div>
    </div>
</div>

<!-- Подключаем модули -->
<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/utils/toast.js"></script>
<script type="module" src="js/utils/helpers.js"></script>
<script type="module" src="js/services/auth.js"></script>
<script type="module" src="js/services/firestore.js"></script>
<script type="module" src="js/services/chat.js"></script>
<script type="module" src="js/components/auth.js"></script>
<script type="module" src="js/components/chats.js"></script>
<script type="module" src="js/components/chat.js"></script>
<script type="module" src="js/components/profile.js"></script>
<script type="module" src="js/components/search.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
