<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tellme</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
    <!-- ========== ЭКРАН АВТОРИЗАЦИИ ========== -->
    <div id="authScreen" class="screen active">
        <div class="auth-container">
            <div class="auth-logo">
                <div class="logo-circle">T</div>
                <h1>Tellme</h1>
            </div>
            
            <div class="auth-card">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Вход</button>
                    <button class="auth-tab" data-tab="register">Регистрация</button>
                </div>

                <div id="loginForm" class="auth-form active">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="Email">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Пароль">
                    </div>
                    <button id="loginBtn" class="auth-btn">Войти</button>
                </div>

                <div id="registerForm" class="auth-form">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="regEmail" placeholder="Email">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="regNickname" placeholder="Никнейм">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-user-circle"></i>
                        <input type="text" id="regName" placeholder="Ваше имя">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-info-circle"></i>
                        <input type="text" id="regBio" placeholder="О себе (необязательно)">
                    </div>
                    <button id="registerBtn" class="auth-btn">Создать аккаунт</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== ЭКРАН ЧАТОВ ========== -->
    <div id="chatsScreen" class="screen">
        <div class="header">
            <h2><span class="logo-icon">T</span> Чаты</h2>
            <button id="searchBtn" class="header-btn"><i class="fas fa-search"></i></button>
            <button id="profileBtn" class="header-btn"><i class="fas fa-user-circle"></i></button>
        </div>
        <div id="chatsList" class="chats-list">
            <div class="empty-state">
                <i class="fas fa-comments"></i>
                <p>Чатов пока нет</p>
                <span>Найдите пользователей через поиск</span>
            </div>
        </div>
    </div>

    <!-- ========== ЭКРАН ПОИСКА ========== -->
    <div id="searchScreen" class="screen">
        <div class="header">
            <button class="back-btn" id="backFromSearch"><i class="fas fa-arrow-left"></i></button>
            <h2>Поиск</h2>
        </div>
        <div class="search-container">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Имя, никнейм или email...">
            </div>
        </div>
        <div id="searchResults" class="search-results"></div>
    </div>

    <!-- ========== ЭКРАН ЧАТА ========== -->
    <div id="chatScreen" class="screen">
        <div class="header">
            <button class="back-btn" id="backToChats"><i class="fas fa-arrow-left"></i></button>
            <div class="chat-header-info" id="chatProfileBtn">
                <div id="chatTitleName"></div>
                <div id="chatStatus"></div>
            </div>
        </div>
        <div id="messagesContainer" class="messages-container"></div>
        <div class="input-area">
            <button id="attachFileBtn"><i class="fas fa-paperclip"></i></button>
            <input type="text" id="messageInput" placeholder="Сообщение...">
            <button id="sendMsgBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
        <input type="file" id="fileInput" style="display:none" multiple>
    </div>

    <!-- ========== ЭКРАН ПРОФИЛЯ ========== -->
    <div id="profileScreen" class="screen">
        <div class="header">
            <button class="back-btn" id="backFromProfile"><i class="fas fa-arrow-left"></i></button>
            <h2>Профиль</h2>
        </div>
        <div class="profile-header">
            <div class="profile-avatar" id="profileAvatar">
                <i class="fas fa-user-circle"></i>
            </div>
            <div class="profile-name" id="profileName"></div>
            <div class="profile-email" id="profileEmail"></div>
            <div class="profile-bio" id="profileBio"></div>
            <div class="profile-status" id="profileLastSeen"></div>
        </div>
        <div class="settings-item" id="editProfileBtn">
            <span>Редактировать профиль</span>
            <i class="fas fa-chevron-right"></i>
        </div>
        <div class="settings-item" id="logoutBtn">
            <span>Выйти из аккаунта</span>
            <i class="fas fa-sign-out-alt"></i>
        </div>
    </div>

    <!-- ========== МОДАЛКА ПРОФИЛЯ ПОЛЬЗОВАТЕЛЯ ========== -->
    <div id="userProfileModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="profile-avatar" id="modalUserAvatar"></div>
            <h3 id="modalUserName"></h3>
            <p id="modalUserEmail"></p>
            <p id="modalUserBio"></p>
            <p id="modalUserStatus"></p>
            <button id="modalStartChatBtn" class="start-chat-btn">Написать сообщение</button>
            <button id="closeModalBtn">Закрыть</button>
        </div>
    </div>
</div>

<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/utils/toast.js"></script>
<script type="module" src="js/utils/helpers.js"></script>
<script type="module" src="js/services/auth.js"></script>
<script type="module" src="js/services/firestore.js"></script>
<script type="module" src="js/services/chat.js"></script>
<script type="module" src="js/components/auth.js"></script>
<script type="module" src="js/components/chats.js"></script>
<script type="module" src="js/components/chat.js"></script>
<script type="module" src="js/components/profile.js"></script>
<script type="module" src="js/components/search.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
